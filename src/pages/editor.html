<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function() {
      try {
        var saved = localStorage.getItem('mc-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create and edit medical notes with live preview. Paste note JSON, preview rendered output, and save to Medicine Cloud.">
  <title>Note Editor — Medicine Cloud</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Literata:opsz,wght@7..72,400;7..72,600&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.MC_SUPABASE_URL = '__MC_SUPABASE_URL__';
    window.MC_SUPABASE_ANON_KEY = '__MC_SUPABASE_ANON_KEY__';
  </script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    const session = await requireAuth();
    if (session) window.__MC_SESSION__ = session;
  </script>

  <link id="mc-template-link" rel="stylesheet" href="../css/templates/classic.css">

  <style>
    @media (prefers-reduced-motion: reduce) {
      #saveBtn.loading { animation-duration: 0.001ms !important; }
    }
    #saveBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    textarea#jsonInput:focus-visible,
    #saveBtn:focus-visible,
    #clearBtn:focus-visible,
    #templateSelect:focus-visible {
      outline: 2.5px solid var(--coral);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <span class="app-brand">Medicine Cloud</span>
    <nav class="app-nav">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="editor.html" class="nav-link active">Editor</a>
      <a href="note.html" class="nav-link">Note</a>
      <a href="settings.html" class="nav-link">Settings</a>
    </nav>
  </header>

  <div class="page-wrap">
    <h1 style="margin-block-end:1rem;">
      <span id="page-title">New Note</span>
    </h1>

    <div class="editor-layout">
      <div class="editor-panel">
        <label for="templateSelect" class="label">Template</label>
        <select id="templateSelect" class="select"></select>

        <label for="jsonInput" class="label">Note JSON</label>
        <textarea id="jsonInput" class="textarea" rows="20" placeholder='Paste your note JSON here... e.g.&#10;{&#10;  "title": "Acid-Base Disorders",&#10;  "lang": "en",&#10;  "content": "&lt;h2&gt;Overview&lt;/h2&gt;&lt;p&gt;Content...&lt;/p&gt;"&#10;}'></textarea>

        <div id="statusBar">Paste note JSON to preview...</div>
      </div>

      <div class="preview-panel">
        <h2 style="font-size:1rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-soft);">Preview</h2>
        <div class="card" id="preview-container">
          <div class="card-body card-body-sm">
            <div id="note-title" style="font-size:0;"></div>
            <div id="note-meta-bar"></div>
            <div id="note-content"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="editor-footer">
    <button id="saveBtn" class="btn btn-primary" disabled aria-disabled="true">Save Note</button>
    <button id="clearBtn" class="btn">Clear</button>
  </footer>

  <script type="module" src="../js/editor.js"></script>
</body>
</html>
